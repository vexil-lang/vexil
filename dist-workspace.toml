[workspace]
members = ["cargo:./"]

[dist]
# cargo-dist version that generated this config
cargo-dist-version = "0.31.0"
# CI backends to generate
ci = "github"
# Build targets
targets = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
]
# Generate install scripts
installers = ["shell", "powershell"]
# Only distribute the vexilc binary (not library crates)
install-path = "CARGO_HOME"
# Allow cargo-dist to update CI files
allow-dirty = ["ci"]
# Run cargo-dist on Release PRs to verify builds
pr-run-mode = "upload"
# Customize GitHub runners for ARM Linux
[dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
