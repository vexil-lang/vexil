<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexil System Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 2rem;
  }
  h1 { font-size: 1.5rem; color: #fff; margin-bottom: 0.25rem; }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
  .subtitle code {
    color: #6ee7b7; background: #1a1a2e;
    padding: 2px 6px; border-radius: 3px; font-size: 0.8rem;
  }
  #connection { margin-left: 0.5rem; }
  #connection.ok { color: #6ee7b7; }
  #connection.err { color: #ef4444; }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1.5rem; max-width: 960px;
  }
  .card {
    background: #12121a; border: 1px solid #2a2a3a;
    border-radius: 12px; padding: 1.25rem;
  }
  .card h2 {
    font-size: 0.8rem; color: #666; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 1rem;
  }
  .big-number { font-size: 3rem; font-weight: 700; line-height: 1; }
  .unit { font-size: 1rem; color: #888; font-weight: 400; }
  .bar-bg {
    background: #1a1a2e; border-radius: 6px;
    height: 8px; margin: 6px 0; overflow: hidden;
  }
  .bar {
    height: 100%; border-radius: 6px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }
  .bar.cpu { background: linear-gradient(90deg, #6ee7b7, #3b82f6); }
  .bar.mem { background: linear-gradient(90deg, #f59e0b, #ef4444); }
  .bar.core { background: #6ee7b7; transition: width 0.8s ease; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  }
  .badge-Normal   { background: #064e3b; color: #6ee7b7; }
  .badge-Degraded { background: #78350f; color: #fbbf24; }
  .badge-Critical { background: #7f1d1d; color: #fca5a5; }
  .cores {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px;
  }
  .core-lbl {
    font-size: 0.7rem; color: #666;
    display: flex; justify-content: space-between;
  }
  .card.full { grid-column: 1 / -1; }
  .meta {
    font-size: 0.8rem; color: #555; margin-top: 1.5rem; max-width: 960px;
  }
  .meta span { color: #888; }
  .wire {
    color: #444; font-size: 0.75rem; margin-top: 0.5rem;
  }
  .wire span { color: #6ee7b7; }
  .detail { font-size: 0.85rem; color: #888; margin-top: 0.5rem; }
</style>
</head>
<body>

<h1>System Monitor</h1>
<p class="subtitle">
  Real-time telemetry via <code>Vexil</code> bitpack &mdash; Rust encodes, browser decodes
  <span id="connection" class="err">connecting...</span>
</p>

<div class="grid">
  <div class="card">
    <h2>CPU Usage</h2>
    <div class="big-number"><span id="cpu-val">--</span><span class="unit">%</span></div>
    <div class="bar-bg"><div class="bar cpu" id="cpu-bar" style="width:0%"></div></div>
    <div style="margin-top:0.5rem">
      <span class="badge badge-Normal" id="cpu-status">--</span>
    </div>
  </div>

  <div class="card">
    <h2>Memory</h2>
    <div class="big-number"><span id="mem-val">--</span><span class="unit"> MB</span></div>
    <div class="bar-bg"><div class="bar mem" id="mem-bar" style="width:0%"></div></div>
    <div class="detail" id="mem-detail">-- / -- MB</div>
  </div>

  <div class="card full">
    <h2>Per-Core Usage</h2>
    <div class="cores" id="cores"></div>
  </div>
</div>

<div class="meta">
  Host: <span id="hostname">--</span> &bull;
  Cores: <span id="core-count">--</span> &bull;
  Updated: <span id="timestamp">--</span>
  <div class="wire">
    Wire frame: <span id="wire-size">--</span> bytes
    (Vexil bitpack, binary WebSocket)
  </div>
</div>

<script type="module">
import { SystemSnapshotDecoder, BitReader, SchemaHandshake, SCHEMA_HASH } from './bundle.js';

const decoder = new SystemSnapshotDecoder();

function connect() {
  const el = document.getElementById('connection');
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    // Send schema handshake as first message
    const hs = new SchemaHandshake(SCHEMA_HASH, '1.0.0');
    ws.send(hs.encode());
    el.textContent = 'handshaking...';
    el.className = '';
  };

  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      // Text message = error from server (schema mismatch)
      el.textContent = e.data;
      el.className = 'err';
      ws.close();
      return;
    }

    // Binary message = telemetry frame
    el.textContent = 'live';
    el.className = 'ok';
    const bytes = new Uint8Array(e.data);
    document.getElementById('wire-size').textContent = bytes.length;
    try {
      const r = new BitReader(bytes);
      const s = decoder.decode(r);
      render(s);
    } catch(err) {
      console.error('decode error', err);
    }
  };

  ws.onclose = () => {
    el.textContent = 'reconnecting...';
    el.className = 'err';
    decoder.reset();
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
}

function render(s) {
  document.getElementById('cpu-val').textContent = s.cpu_usage;
  document.getElementById('cpu-bar').style.width = s.cpu_usage + '%';

  const status = s.cpu_status;
  const badge = document.getElementById('cpu-status');
  badge.textContent = status;
  badge.className = 'badge badge-' + status;

  document.getElementById('mem-val').textContent = s.memory_used_mb;
  const memTotal = s.memory_total_mb;
  const memPct = memTotal > 0 ? (s.memory_used_mb / memTotal * 100) : 0;
  document.getElementById('mem-bar').style.width = memPct.toFixed(1) + '%';
  document.getElementById('mem-detail').textContent =
    s.memory_used_mb + ' / ' + memTotal + ' MB (' + memPct.toFixed(1) + '%)';

  document.getElementById('hostname').textContent = s.hostname;
  document.getElementById('core-count').textContent = s.cpu_count;

  // timestamp_ms is a BigInt from the decoder
  const ts = typeof s.timestamp_ms === 'bigint' ? Number(s.timestamp_ms) : s.timestamp_ms;
  document.getElementById('timestamp').textContent = new Date(ts).toLocaleTimeString();

  const box = document.getElementById('cores');
  while (box.children.length > s.per_core_usage.length) box.lastChild.remove();
  s.per_core_usage.forEach((u, i) => {
    let div = box.children[i];
    if (!div) {
      div = document.createElement('div');
      div.innerHTML =
        '<div class="core-lbl"><span></span><span></span></div>' +
        '<div class="bar-bg"><div class="bar core"></div></div>';
      box.appendChild(div);
    }
    const spans = div.querySelectorAll('.core-lbl span');
    spans[0].textContent = 'Core ' + i;
    spans[1].textContent = u + '%';
    div.querySelector('.bar').style.width = u + '%';
  });
}

connect();
</script>
</body>
</html>
