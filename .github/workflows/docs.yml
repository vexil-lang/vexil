name: Build Documentation (deployment disabled)

on:
  push:
    branches: [main]
    paths:
      - 'docs/book/**'
  pull_request:
    paths:
      - 'docs/book/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # This advisory build intentionally has no environment, deployment, OIDC,
    # or provider-write authority.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install mdbook
        run: |
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.44/mdbook-v0.4.44-x86_64-unknown-linux-gnu.tar.gz | tar xz
          chmod +x mdbook
          mv mdbook /usr/local/bin/

      - name: Build book
        run: cd docs/book && mdbook build

      - name: Record deployment boundary
        run: |
          echo "Documentation was built only. GitHub Pages deployment is disabled pending verified Epic 2 external controls."
          echo "Provider environment approval does not authorize a Release Manifest or publication."
