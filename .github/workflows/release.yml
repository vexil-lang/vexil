name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check

  publish-crates:
    name: Publish crates
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish vexil-lang
        run: cargo publish -p vexil-lang --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish vexil-codegen-rust
        run: cargo publish -p vexil-codegen-rust --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish vexil-runtime
        run: cargo publish -p vexil-runtime --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for crates.io index
        run: sleep 30
      - name: Publish vexilc
        run: cargo publish -p vexilc --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    name: Build (${{ matrix.target }})
    needs: [test, lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vexilc.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vexilc
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vexilc
    steps:
      - uses: actions/checkout@v6
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --bin vexilc --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          OUT="vexilc-${{ matrix.target }}"
          [[ "${{ matrix.artifact }}" == *.exe ]] && OUT="${OUT}.exe"
          cp "$BIN" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: vexilc-${{ matrix.target }}
          path: vexilc-${{ matrix.target }}*

  release:
    name: Create release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Generate changelog
        run: git-cliff --latest --strip header -o RELEASE_NOTES.md

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: RELEASE_NOTES.md
          draft: false
