name: Release Readiness (effects disabled)

# A matching tag may run this non-mutating readiness check, but cannot create
# a GitHub Release, publish an artifact, or alter a tag. Privileged release
# execution remains blocked until provider controls and Manifest-bound
# authorization are independently verified.
on:
  pull_request:
  push:
    tags:
      - 'vexilc-v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-boundary:
    name: Record blocked release boundary
    runs-on: ubuntu-22.04
    # This is an advisory/rehearsal job: no environment, secrets, OIDC token,
    # release token, registry identity, or write-capable GitHub token.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          submodules: false
      - name: Record non-authority and stop
        run: |
          echo "Release effects are disabled pending verified external controls."
          echo "A green workflow, tag, or provider environment approval is not Manifest approval."
          echo "No tag, GitHub release, registry publication, deployment, or credential operation was attempted."
