name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vexilc.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vexilc
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vexilc

    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --bin vexilc --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          OUT="vexilc-${{ matrix.target }}"
          [[ "${{ matrix.artifact }}" == *.exe ]] && OUT="${OUT}.exe"
          cp "$BIN" "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: vexilc-${{ matrix.target }}
          path: vexilc-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
