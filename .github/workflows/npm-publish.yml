name: Publish @vexil-lang/runtime to npm

# Triggered when a vexil-runtime tag is pushed.
# Uses npm trusted publishing (OIDC provenance) — no static NPM_TOKEN needed.
# Configure trusted publisher on npmjs.com:
#   Package settings → Trusted publishers → Add:
#     owner: vexil-lang, repo: vexil, workflow: npm-publish.yml

on:
  push:
    tags:
      - "vexil-runtime-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: npm publish
    runs-on: ubuntu-latest
    if: github.repository == 'vexil-lang/vexil'
    defaults:
      run:
        working-directory: packages/runtime-ts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/vexil-runtime-v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing @vexil-lang/runtime@$TAG"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
