name: npm Release Readiness (publication disabled)

on:
  push:
    tags:
      - "vexil-runtime-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    if: github.repository == 'vexil-lang/vexil'
    # This job is deliberately advisory. It does not use a protected
    # environment, registry credential, OIDC token, or write-capable token.
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/runtime-ts
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Record publication boundary
        run: |
          echo "npm publication is disabled pending verified target-isolated external controls."
          echo "No registry credential, OIDC token, or protected environment was accessed."
