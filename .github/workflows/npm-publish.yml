name: Publish @vexil-lang/runtime to npm

on:
  push:
    tags:
      - "vexil-runtime-v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'vexil-lang/vexil'
    defaults:
      run:
        working-directory: packages/runtime-ts
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm version "${GITHUB_REF#refs/tags/vexil-runtime-v}" --no-git-tag-version --allow-same-version
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
