name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Cross-platform tests ────────────────────────────────────────────────────
  # Wire golden tests (wire_golden.rs) run on every platform/arch combination
  # below to prove encoding → bytes and bytes → decoding are identical everywhere.
  # A failure that is platform-specific but not universal indicates an endianness
  # or integer-representation bug in the encoder/decoder.
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest      # Linux x86-64
          - ubuntu-24.04-arm   # Linux arm64
          - windows-latest     # Windows x86-64
          - macos-latest       # macOS arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  # ── TypeScript runtime tests ─────────────────────────────────────────────────
  # Runs @vexil/runtime tests including compliance vectors.
  # Only needs one platform — Node.js is cross-platform.
  ts-runtime:
    name: TypeScript runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/runtime-ts
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── Go runtime tests ──────────────────────────────────────────────────────────
  # Runs @vexil/runtime-go tests.
  # Only needs one platform — Go is cross-platform.
  go-runtime:
    name: Go runtime
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/runtime-go
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Test
        run: go test -v ./...

  # ── MSRV check ──────────────────────────────────────────────────────────────
  # Ensures the workspace compiles on the declared minimum supported Rust version.
  # MSRV is 1.94 (see CLAUDE.md). Only build+test; clippy/fmt use stable toolchain.
  msrv:
    name: MSRV (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust 1.94
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.94

      - name: Build (MSRV)
        run: cargo build --workspace

      - name: Test (MSRV)
        run: cargo test --workspace
