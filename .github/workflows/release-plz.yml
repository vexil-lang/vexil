name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  # ── Publish crates + create tags ────────────────────────────────────────────
  # Only runs when a Release PR is merged (commit message starts with
  # "chore(release):"). This prevents accidental releases from docs commits,
  # CI fixes, or other non-release pushes to main.
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'vexil-lang/vexil' &&
      startsWith(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Create/update Release PR ────────────────────────────────────────────────
  # Runs on every push to main. Proposes version bumps for crates that have
  # unreleased changes. Each crate is versioned independently.
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: github.repository == 'vexil-lang/vexil'
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
