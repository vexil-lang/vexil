name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: rust
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: ${{ matrix.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@e0647621c2984b5ed2f768cb892365bf2a616ad1

      - name: Analyze
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1
