# release-plz configuration
# https://release-plz.dev/docs/config

[workspace]
# Use git-cliff for changelog generation
changelog_config = "cliff.toml"
# Update changelogs in Release PRs
changelog_update = true
# Update workspace dependency versions when bumping
dependencies_update = true
# Create git tags on release
git_tag_enable = true
# Per-crate tag format (e.g. vexil-lang-v0.2.4)
git_tag_name = "{{ package }}-v{{ version }}"
# Don't create GitHub Releases — cargo-dist handles that for vexilc
git_release_enable = false
# Label Release PRs for easy filtering
pr_labels = ["release"]
# Disable semver checking pre-1.0 (enable post-1.0)
semver_check = false
# PR name format
pr_name = "chore(release): bump crate versions"

# ── Per-crate versioning ─────────────────────────────────────────────────────
# Each crate versions independently. Only crates with actual changes get bumped.
# No version_group — crates are NOT locked in step.

[[package]]
name = "vexil-lang"

[[package]]
name = "vexil-runtime"

[[package]]
name = "vexil-codegen-rust"

[[package]]
name = "vexil-codegen-ts"

[[package]]
name = "vexil-store"

[[package]]
name = "vexilc"
# vexilc is a CLI binary — don't generate a changelog for it separately
changelog_update = false

[[package]]
name = "vexil-bench"
# Excluded — publish = false, benchmarks only
publish = false
release = false
changelog_update = false
